name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 1. Lint
      - name: Run ESLint
        run: npm run lint

      # 2. Unit Test
      - name: Run tests
        run: npm test

      # 3. Build
      - name: Build project
        run: npm run build