name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - develop


jobs:
  ci:
    runs-on: ubuntu-latest

    

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd backend && npm ci

     

      # 2. Unit Test
      - name: Run tests
        run: cd backend && npm test

     